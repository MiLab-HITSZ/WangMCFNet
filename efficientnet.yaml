DATASET:
  IMG_SIZE: 380
  TRAIN_AUGMENTATIONS:
    COMPOSE:
      [
        Resize,
        HorizontalFlip,
        Normalize
      ]
    NORMALIZE_PARAMS: [[0.5, 0.5, 0.5], [0.5, 0.5, 0.5]]
  TEST_AUGMENTATIONS:
    COMPOSE: [Resize, Normalize]
    NORMALIZE_PARAMS: [[0.5, 0.5, 0.5], [0.5, 0.5, 0.5]]
DATALOADER:
  BATCH_SIZE: 8
  NUM_WORKERS: 4
MODEL:
  MODEL_NAME: EfficientNet
  NET: efficientnet-b4
  VARIANT: efficientnet-b4
  NUM_ATTENTIONS: 4
  ATTENTION_LAYER: 'b5'
  FEATURE_LAYER: 'b2'
  MID_DIMS: 256
  DROPOUT_RATE: 0.25
  DROP_FINAL_RATE: 0.5
  RRETRAINED: FALSE
  ALPHA: 0.05
  SIZE: [380, 380]
  MARGIN: 0.2
  INNER_MARGIN: [0.05, 0.1]

  PRETRAINED: True
OPTIMIZER:
  OPTIMIZER_METHOD: adam
  BASE_LR: 0.00005
  ADAM_BETAS: [0.9, 0.999]
  EPS: 0.00000001
  WEIGHT_DECAY: 0.000001
SCHEDULER:
  SCHEDULER_TYPE: step
  DECAY_EPOCHS: 5
  DECAY_RATE: 0.5